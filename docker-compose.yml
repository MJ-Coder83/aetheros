# InkosAI Production Docker Compose
# Includes: PostgreSQL, Redis, and the API server

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: inkosai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkosai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inkosai_secure_password}
      POSTGRES_DB: inkosai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkosai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: inkosai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-inkosai_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InkosAI API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: inkosai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://inkosai:${DB_PASSWORD:-inkosai_secure_password}@postgres:5432/inkosai

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_in_production_very_long_random_string}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-inkosai_redis_password}@redis:6379/0

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://inkos.ai}

      # Security
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"

      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
    ports:
      - "8000:8000"
    volumes:
      # For persistent tape storage
      - tape_data:/app/tape
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Plugin sandbox (Deno-based)
  plugin-sandbox:
    image: denoland/deno:alpine
    container_name: inkosai-plugin-sandbox
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "deno"
    volumes:
      - plugin_sandbox:/tmp/sandbox
    networks:
      - default
    command: ["deno", "repl"]
    profiles: ["sandbox"]

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: inkosai-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - default

  # Jaeger for distributed tracing (receives OTLP)
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: inkosai-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - default

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: inkosai-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - default
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  tape_data:
  plugin_sandbox:
  prometheus_data:
  grafana_data:

networks:
  default:
    driver: bridge
